<!DOCTYPE html>
<html lang="en">

    ---------------------------------------------------

    * Central place for breadcrumb placeholder – navigation.js will inject the actual markup.
    * Includes JSON‑LD schema block that can be populated with data at runtime.
  -->
  <meta charset="UTF-8" />

  <meta property="og:description" content="Browse hospitality in Tauranga." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="<!-- PAGE_URL_PLACEHOLDER -->" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Schema -->
  <script type="application/ld+json">{
  "@context": "https://schema.org",

    {
      "@type": "CollectionPage",
      "name": "Hospitality in Tauranga | TopRated NZ",

}</script>
